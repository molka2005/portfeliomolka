name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # déclenché à chaque push sur main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: portfelionmolka/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: portfelionmolka

      - name: Build
        run: npm run build
        working-directory: portfelionmolka

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfelionmolka/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
